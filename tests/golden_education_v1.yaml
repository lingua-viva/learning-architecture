# --- Decoys: cross-domain and near-miss disambiguation ---
- id: EDU-DECOY-001
  query: "This client conversation is attorney-client privileged — can you help me draft a response to opposing counsel?"
  expected_node: MC-LEGAL-001
  expected_intent: PROTECT
  difficulty: decoy
  note: "Privacy language alone (no education signal) must NOT be pulled into an LV-* node."
- id: EDU-DECOY-002
  query: "I need a review of the amendment clause in this vendor contract before we sign."
  expected_node: MC-LEGAL-004
  expected_intent: DECIDE
  difficulty: decoy
  note: "Contract-review language must route to legal, not misfire on unrelated education signals."
- id: EDU-DECOY-003
  query: "Can you review the rubric clause in the vendor contract renewal?"
  expected_node: MC-LEGAL-004
  expected_intent: DECIDE
  difficulty: decoy
  note: "'rubric' overlaps LV-ASS-001's signal list, but context ('contract', 'clause') is legal, not classroom assessment — tests keyword-vs-context precision."
- id: EDU-DECOY-004
  query: "What level is this passage written at?"
  expected_node: LV-STU-002
  expected_intent: DECIDE
  difficulty: decoy
  note: "'what level' is a literal LV-STU-002 signal even with no student named — documents that generic text-leveling questions currently get treated as student-specific (a known keyword-matching limitation, not a fix)."
- id: EDU-DECOY-005
  query: "What's the weather forecast for tomorrow's field trip?"
  expected_node: CORE-RESEARCH
  expected_intent: RESEARCH
  difficulty: decoy
  note: "No domain signal should match — must fall back cleanly rather than false-positive onto an education node."
- id: EDU-DECOY-006
  query: "We tried a new fractions routine last year that worked really well — what did we learn from it that we should carry forward?"
  expected_node: LV-TCH-005
  expected_intent: REFLECT
  difficulty: decoy
  note: "Overlaps LV-TCH-003 ('routine') and LV-CUR-006 ('progression'-adjacent) signal-wise; 'last year' + 'carry forward' should still resolve to institutional memory, not scaffold bank."
