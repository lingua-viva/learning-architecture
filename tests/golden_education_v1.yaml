# Lingua Viva Education Golden Query Suite
# Teacher-voice and admin-voice queries against the 38 LV-* education nodes,
# plus PROTECT-tagged sensitive-student queries and cross-domain decoys.
# Run: python3 -m src.mc_cli eval tests/golden_education_v1.yaml

queries:
# --- Curriculum (LV-CUR-*) ---
- id: EDU-001
  query: "I need to plan a unit of inquiry for our next transdisciplinary theme — what's the central idea and what lines of inquiry should we build?"
  expected_node: LV-CUR-001
  expected_intent: CREATE
  difficulty: easy
- id: EDU-002
  query: "Three of my students are still at A1 while the rest of the class is B1 — how do I differentiate this reading activity for mixed levels?"
  expected_node: LV-CUR-002
  expected_intent: CREATE
  difficulty: medium
- id: EDU-003
  query: "Can you map our Italian language progression across grades 1 through 5 against CEFR descriptors?"
  expected_node: LV-CUR-003
  expected_intent: CREATE
  difficulty: easy
- id: EDU-004
  query: "How does this unit align to the Indicazioni Ministeriali grammatica objectives for grade 3?"
  expected_node: LV-CUR-004
  expected_intent: CREATE
  difficulty: medium
- id: EDU-005
  query: "I want to design a Reggio-inspired multimodal exploration activity connected to our current inquiry, something for the atelier."
  expected_node: LV-CUR-005
  expected_intent: CREATE
  difficulty: medium

