perplexity_findings:
- content: 'Still I Rise’s **Kenya** school materials indicate that refugee students
    are commonly from **Congo/DRC, Somalia, South Sudan, Burundi, Ethiopia, Uganda,
    and Rwanda**, which implies a mix of **French, Swahili/Kiswahili, English, Arabic,
    Somali, and other local languages** among the refugee population rather than one
    single dominant home language.[6][10][1] The clearest language claim in the organization’s
    own Kenya language policy is that many refugee students are already *bilingual
    or trilingual*, and that some have learned **English** and **Kiswahili** before
    enrollment; it also says **French** is common among refugee students and is taught
    as a compulsory second language.[1]


    What I could verify most directly is:

    - In Kenya, **English** is the school’s language of instruction, while **Kiswahili**
    and **French** are compulsory second languages.[5][1]

    - The refugee student body in Kenya is drawn from multiple countries, with documented
    representation from the DRC, Somalia, South Sudan, Burundi, Ethiopia, Uganda,
    and Rwanda.[10][6]

    - The organization explicitly teaches or uses **English, Kiswahili, French, and
    Arabic** in different programs and contexts.[1][9][12]


    I could **not** verify a single authoritative source that lists the *primary spoken
    languages of the refugee student population across all Still I Rise schools* in
    **Kenya, Colombia, India, and Italy** together. The available sources are mostly
    Kenya-specific, and the only school-level language data I found outside Kenya
    describes program languages rather than refugee home languages.[1][9][12]


    For publication language, the organization’s public materials visible in the results
    are published in **English** and **Italian**: the site includes English-language
    pages and reports, and it also publishes Italian-language pages and documents,
    such as “Relazione attività.”[7][9][12] I could not verify from the retrieved
    sources whether it publishes *all* materials in both languages or whether some
    materials also appear in additional languages.'
