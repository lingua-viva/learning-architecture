perplexity_findings:
- content: "`--help` is a **command-line option** that, when added to most Linux/UNIX\
    \ commands, prints a brief usage summary, available options, and exits instead\
    \ of performing the normal action.[2][7][10]\n\nMost of what you already have\
    \ is *descriptive* (what `--help` does) but missing *normative/standardization\
    \ details* and *edge-case behavior*:\n\n1. **Standards and “official” behavior\
    \ (primary sources)**  \n   - The **GNU Coding Standards** specify that a program’s\
    \ standard `--help` option should:  \n     - Print *brief documentation* on how\
    \ to invoke the program.[10]  \n     - Write to **standard output** (not stderr).[10]\
    \  \n     - **Exit successfully** and ignore all other options/arguments once\
    \ `--help` is seen.[10]  \n   These are the closest thing to a “primary” specification\
    \ for GNU userland tools; there is no universal POSIX standard for `--help` that\
    \ applies to all CLI programs.[10]  \n   - There is **no formal requirement**\
    \ that every Linux command must support `--help`; many do, but some POSIX utilities\
    \ or older programs do not implement it at all.[11]\n\n2. **Relationship between\
    \ `help` and `--help` (missing distinctions)**  \n   - The shell built‑in **`help`**\
    \ (e.g. in Bash) is a separate command whose job is to document *shell built‑ins*\
    \ only.[1][3][16][17]  \n   - For **external programs**, `help` often does nothing;\
    \ users must rely on `command --help` or `man`.[2][8]  \n   - The distinction\
    \ between:  \n     - **Primary source**: Bash documentation specifying `help`’s\
    \ behavior (not covered in your results).  \n     - **Secondary sources**: Tutorials\
    \ explaining that `help` is only for built‑ins and `--help`/`man` are needed for\
    \ others.[1][2][3][16][17]\n\n3. **Format and conventions for help text (partially\
    \ covered, but not standardized)**  \n   - There is informal convention (not a\
    \ strict standard) that `-h` and `--help` should trigger help text, and that the\
    \ same help should be shown when the user misuses the command line syntax.[18]"
