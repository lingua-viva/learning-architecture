- content: "A morning briefing for a teacher in a differentiated IB classroom is less\
    \ about a fixed “meeting” and more about a fast, structured scan of learner data,\
    \ planned learning pathways, and logistical constraints before students arrive.\
    \ In a well‑run differentiated IB class, most of the differentiation work is actually\
    \ front‑loaded into this pre‑lesson thinking and planning, even if schools rarely\
    \ describe it explicitly in their documentation.[7][14]\n\n**What research and\
    \ practice already cover (and how it maps to a morning briefing)**  \nExisting\
    \ sources emphasize *principles* of differentiation rather than the concrete,\
    \ minute‑by‑minute briefing a teacher runs through before class:\n\n- IB and other\
    \ differentiation guides stress knowing learner readiness, interests, and profiles,\
    \ using ongoing assessment to “check where students are constantly” and then “respond\
    \ to student needs” with flexible grouping, multiple pathways, and scaffolded\
    \ tasks.[7][9][10][14]  \n- Practical advice focuses on routines that make simultaneous\
    \ activities possible: anchor tasks, “expert of the day,” clear expectations for\
    \ independent work, and fluid small groups so the teacher can confer with some\
    \ students while others work autonomously.[9][5]  \n- IB‑specific discussion (PYP/MYP)\
    \ highlights flexible grouping, choice boards, open‑ended tasks, and continual\
    \ use of formative data (exit tickets, quick pre‑assessments) to adjust the next\
    \ day’s plan.[3][4][5][12][16]  \n\nAll of this implies that a *useful morning\
    \ briefing* centers on:  \n1) *Yesterday’s data* (formative assessments, observations,\
    \ unfinished work),  \n2) *Today’s objectives and success criteria*,  \n3) *Group\
    \ structures and supports* (who works with whom, with what scaffolds), and  \n\
    4) *Operational constraints* (time, space, devices, pull‑outs, etc.).  \n\nHowever,\
    \ current sources do not spell out a concrete, repeated checklist a teacher runs\
    \ through before the day starts; that is a genuine gap.\n\n---\n\n**What a differentiated\
    \ IB “morning briefing” would likely include (inferred from evidence)**  \n\n\
    Based on the principles above, a realistic pre‑day routine for an IB teacher might\
    \ look like this (this is an evidence‑based reconstruction, not something described\
    \ verbatim in the literature):\n\n1. **Clarify the learning for the day**  \n\
