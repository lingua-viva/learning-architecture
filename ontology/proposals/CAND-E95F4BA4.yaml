- content: "For MYP **Language Acquisition – Criterion B (Reading)**, there are **achievement\
    \ levels from 0 to 8**, grouped in four bands with specific descriptors for reading\
    \ performance.[6][8]\n\n**Standard banding (Years 1–3, simple texts)**[1][6] \
    \ \n- **Level 0** – The student does not reach a standard described by any of\
    \ the descriptors below.[6]  \n- **Levels 1–2 (limited)** – The student:  \n \
    \ - identifies **minimal stated information** (facts, opinions, messages) in a\
    \ variety of **simple authentic texts**[6]  \n  - identifies **basic conventions**\
    \ in simple authentic texts[6]  \n  - identifies **basic connections** in simple\
    \ authentic texts[6]  \n- **Levels 3–4 (adequate)** – The student:  \n  - identifies\
    \ **some stated information** in a variety of simple authentic texts[6]  \n  -\
    \ identifies basic conventions in simple authentic texts[6]  \n  - identifies\
    \ basic connections in simple authentic texts[6]  \n- **Levels 5–6 (substantial)**\
    \ – The student:  \n  - identifies **most stated information**, including supporting\
    \ details, in simple authentic texts[6]  \n  - **interprets conventions** in simple\
    \ authentic texts[6]  \n  - **interprets connections** in simple authentic texts[6]\
    \  \n- **Levels 7–8 (excellent)** – The student:  \n  - identifies **explicit\
    \ and implicit information** (facts, opinions, messages, supporting details) in\
    \ a **wide variety** of simple authentic texts[6][1]  \n  - **analyses conventions**\
    \ in simple authentic texts[6]  \n  - **analyses connections** in simple authentic\
    \ texts[6]  \n\n**Proficient level (Years 4–5, complex texts)**  \nIn later years,\
    \ the same 0–8 scale applies, but descriptors shift from **simple** to **complex\
    \ authentic texts**:[8]  \n- **1–2:** minimal stated information; basic conventions;\
    \ basic connections in **complex texts**[8]  \n- **3–4:** some stated information;\
    \ basic conventions; basic connections in complex texts[8]  \n- **5–6:** most\
    \ stated information and supporting details; interprets conventions in complex\
    \ texts[8]  \n- **7–8:** identifies explicit and implicit information"
