- content: 'In the **MYP subject guides**, Criterion B is typically split into **four
    achievement bands**: **1–2**, **3–4**, **5–6**, and **7–8**, with **0** used when
    the student does not meet any descriptor.[2][3][4][7]


    The exact wording depends on the subject, but the bands are consistently described
    as:

    - **1–2:** limited achievement[2][3][4][6]

    - **3–4:** adequate achievement[2][3][4][6]

    - **5–6:** substantial achievement[2][3][4][6]

    - **7–8:** excellent achievement[2][3][4][6]


    For example, in the MYP science rubric for Criterion B, the descriptors progress
    from **state/outline** at lower levels to **describe/explain** and more complete,
    logical, and safe methods at higher levels.[6][9] In mathematics, Criterion B
    is described as **Investigating patterns**, and the same four-band structure is
    used.[3]


    What I could not fully verify from the results is whether you mean a specific
    **subject guide** from one subject group, because each guide gives its own Criterion
    B criteria statements even though the achievement bands are the same across MYP
    subjects.[3][4][7]'
