- content: 'She is likely entering a **new phase of implicit grammatical learning**:
    her internal model of English morphology has strengthened enough that errors now
    feel “wrong” to her, so she initiates repairs on her own rather than relying on
    external correction.


    Available research on second-language acquisition and child language development
    documents several related phenomena—*self-repair*, *monitoring*, and the emergence
    of an internal “grammar feel”—but there is limited fine-grained, longitudinal
    data on **micro-transitions** like the one you’re observing (e.g., “from needing
    correction to spontaneously fixing verb endings over a single month”). Most studies
    either aggregate over longer timescales or focus on global proficiency changes,
    not the specific onset dynamics of self-correction in verb morphology. This is
    a gap: we lack detailed models of *how quickly* and *under what conditions* self-monitoring
    for specific grammatical subsystems (like tense/agreement) switches from externally
    driven to internally driven, and how that maps onto input type, feedback style,
    or cognitive development stages.


    We also have relatively weak empirical characterizations of **error profile shifts
    at the moment self-correction begins**: for example, whether learners initially
    overcorrect (hyper-regularization: *“he goed” → “he went”* vs. *“he goes”*), whether
    certain verb classes trigger more or fewer self-repairs, and how much “latent
    knowledge” is present before overt self-correction becomes visible. Existing work
    often treats interference and forgetting as global properties of semantic/memory
    systems, but does not drill into **local, form-specific stability**—how verb conjugation
    knowledge moves from fragile, interference-prone recall to robust, automatically
    monitored usage.[1][2] This is another missing piece: we don’t have precise, episodic-level
    traces of how a learner like Amira stabilizes one micro-grammar (English verbs)
    while the rest of the language system is still fluctuating.


    A further gap is the **interaction between semantic memory and exact episodic
    grounding in live language learning**. The “Price of Meaning” framework shows
    that any meaning-based memory system will occasionally forget or mix things up,
    unless supported by an exact episodic/verifier layer.[1][2] Yet in human language
