- content: "I cannot see your location from this chat, so I cannot give a specific\
    \ forecast for your field trip site. To get an accurate forecast for **tomorrow\
    \ at your exact destination**, use one of these:\n\n- **U.S. locations (most reliable):**\
    \  \n  1. Go to the National Weather Service forecast page.[1]  \n  2. Type the\
    \ **city/ZIP of your field trip location** in the search box.  \n  3. For hour‑by‑hour\
    \ rain, temperature, and wind during the trip time, click **“Hourly Weather Graph”**\
    \ under “More Information.”[3]\n\n- **Outside the U.S.:**  \n  Use a national\
    \ meteorological service (e.g., Met Office, Environment Canada) or a major service\
    \ like BBC Weather or The Weather Channel and enter the **exact town or coordinates**.[8][12]\n\
    \nIf you tell me the **field trip location (city/region and country)** and roughly\
    \ what hours you’ll be outside, I can interpret the forecast for you (rain risk,\
    \ heat, wind, and what to pack) using those sources."
