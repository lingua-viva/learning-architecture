name: Check Signing Secrets
on:
  workflow_dispatch: {}

# Diagnostic only. Reports SET/MISSING for each secret required by
# desktop-release.yml's signing/notarization steps. Never prints values.
# Exists because manual "are the secrets there?" checks across sessions
# have given conflicting answers more than once.

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Report secret presence
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          check() {
            if [ -n "$2" ]; then
              echo "$1: SET (len=${#2})"
            else
              echo "$1: MISSING"
            fi
          }
          echo "=== macOS signing/notarization ==="
          check CSC_LINK "$CSC_LINK"
          check CSC_KEY_PASSWORD "$CSC_KEY_PASSWORD"
          check APPLE_API_KEY_BASE64 "$APPLE_API_KEY_BASE64"
          check APPLE_API_KEY_ID "$APPLE_API_KEY_ID"
          check APPLE_API_ISSUER "$APPLE_API_ISSUER"
          echo ""
          echo "=== Windows Azure Trusted Signing ==="
          check AZURE_TENANT_ID "$AZURE_TENANT_ID"
          check AZURE_CLIENT_ID "$AZURE_CLIENT_ID"
          check AZURE_CLIENT_SECRET "$AZURE_CLIENT_SECRET"
