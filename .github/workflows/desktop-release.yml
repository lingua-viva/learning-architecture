name: Desktop Release
on:
  push:
    tags: ['desktop-v*']

# Adapted from mission-canvas/.github/workflows/desktop-release.yml.
# Builds the Electron desktop app (setup wizard + embedded LV server).
# The CLI binary release uses release.yml (triggered by v* tags).
#
# MUST stay prerelease: true — otherwise desktop releases steal the CLI's
# "latest" slot and `curl -fsSL linguaviva.art/install.sh | sh` 404s on
# CLI binaries.
#
# Signing/notarization: same Apple Developer ID as Mission Canvas (XWT7RB624U).
# Requires these repo secrets:
#   CSC_LINK            — .p12 certificate, base64-encoded
#   CSC_KEY_PASSWORD    — password for the .p12
#   APPLE_API_KEY_BASE64 — App Store Connect API key (.p8), base64-encoded
#   APPLE_API_KEY_ID    — Key ID from App Store Connect
#   APPLE_API_ISSUER    — Issuer ID from App Store Connect

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            dist_args: --mac dmg
            rename_from: "*.dmg"
            rename_to: LinguaViva.dmg
          - os: windows-latest
            dist_args: --win nsis
            rename_from: "*.exe"
            rename_to: LinguaViva-Setup.exe
          - os: ubuntu-latest
            dist_args: --linux AppImage
            rename_from: "*.AppImage"
            rename_to: LinguaViva.AppImage

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Set up signing keychain
        if: matrix.os == 'macos-latest'
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.CSC_LINK }}
          MAC_CERT_P12_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [ -z "$MAC_CERT_P12_BASE64" ]; then
            echo "::error::No macOS signing certificate (CSC_LINK secret is empty). Build will produce unsigned app."
            exit 1
          fi
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          printf "%s" "$MAC_CERT_P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -P "$MAC_CERT_P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Stage notary API key
        if: matrix.os == 'macos-latest'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          if [ -z "$APPLE_API_KEY_BASE64" ]; then
            echo "::error::No Apple API key (APPLE_API_KEY_BASE64 secret is empty). Notarization will fail."
            exit 1
          fi
          mkdir -p $RUNNER_TEMP/api-key
          printf "%s" "$APPLE_API_KEY_BASE64" | base64 --decode > $RUNNER_TEMP/api-key/AuthKey.p8

      - name: Build renderer and electron
        working-directory: desktop
        run: npm run build

      - name: Package with electron-builder
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'true'
        shell: bash
        timeout-minutes: 15
        run: ./node_modules/.bin/electron-builder ${{ matrix.dist_args }}

      - name: Notarize macOS app
        if: matrix.os == 'macos-latest'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          # Write the API key
          mkdir -p $RUNNER_TEMP/api-key
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > $RUNNER_TEMP/api-key/AuthKey.p8
          
          # Find the .app
          APP=$(find desktop/release -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app found to notarize"
            exit 1
          fi
          echo "Notarizing: $APP"
          
          # Zip the .app for submission
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/app-to-notarize.zip"
          
          # Submit to Apple
          xcrun notarytool submit "$RUNNER_TEMP/app-to-notarize.zip" \
            --key "$RUNNER_TEMP/api-key/AuthKey.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait --timeout 10m
          
          # Staple the ticket
          xcrun stapler staple "$APP"
          echo "✓ Notarization complete and stapled"

      - name: Verify macOS signature
        if: matrix.os == 'macos-latest'
        shell: bash
        working-directory: desktop
        run: |
          APP=$(find . -maxdepth 4 -name "*.app" -not -path "*/node_modules/*" | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app bundle found to verify"
            exit 1
          fi
          echo "=== Codesign verify ==="
          codesign --verify --deep --strict "$APP"
          echo "=== Gatekeeper assessment ==="
          spctl --assess --type execute "$APP" 2>&1 || true
          echo "=== Signing identity ==="
          codesign -dv "$APP" 2>&1 | grep -E "Authority|TeamIdentifier|Identifier"
          # Hard gate: if TeamIdentifier is "not set", fail the build
          TEAM=$(codesign -dv "$APP" 2>&1 | grep TeamIdentifier | awk '{print $NF}')
          if [ "$TEAM" = "not" ] || [ -z "$TEAM" ]; then
            echo "::error::App is NOT signed with a Developer ID (TeamIdentifier=$TEAM). Cannot ship."
            exit 1
          fi
          echo "✓ Signed by team: $TEAM"

      - name: Rename artifact
        shell: bash
        working-directory: desktop
        run: |
          echo "=== Looking for built artifacts ==="
          find . -maxdepth 4 -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" \) -not -path "*/node_modules/*" 2>/dev/null || true
          echo "=== release/ contents ==="
          ls -lhR release/ 2>/dev/null || echo "release/ does not exist"
          FOUND=$(find . -maxdepth 4 -type f -name "${{ matrix.rename_from }}" -not -path "*/node_modules/*" | head -1)
          if [ -n "$FOUND" ]; then
            mkdir -p release
            mv "$FOUND" "release/${{ matrix.rename_to }}"
            echo "Renamed $FOUND → release/${{ matrix.rename_to }}"
          else
            echo "ERROR: No file matching ${{ matrix.rename_from }} found"
            exit 1
          fi
          ls -lh "release/${{ matrix.rename_to }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: desktop/release/${{ matrix.rename_to }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts/

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/LinguaViva.dmg
            artifacts/LinguaViva-Setup.exe
            artifacts/LinguaViva.AppImage
          generate_release_notes: true
          prerelease: true  # MUST stay true — desktop releases steal the CLI's "latest" slot otherwise
