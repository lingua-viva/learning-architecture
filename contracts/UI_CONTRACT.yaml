# UI Bundle Contract — Lingua Viva (MC-lessons §3, 2026-07-19)
#
# Protects the teacher-facing UI (static/index.html — the whole 49KB+
# sidebar app, static/sw.js — the PWA service worker) and its server
# (src/web.py, 40+ endpoints) from silent drift. Cloned from Mission
# Canvas's own proven WIZARD_CONTRACT.yaml / check_wizard_contract.py shape
# (dev practice: clone, don't redesign installers/contracts).
#
# Any change to a listed file requires a deliberate version bump:
#   python3 scripts/check_ui_contract.py --bump
#
# CEREMONY RULE: any build step that writes static/ (npm run build under
# desktop/, hand edits to index.html/sw.js, endpoint additions to web.py)
# must be followed by a contract re-lock. Lock AFTER the build, never
# before — MC's v27->v28 trap was a desktop build regenerating static asset
# hashes after the lock was already taken, which preflight then caught.
#
# Bump log (one line per deliberate change — the comments are the changelog):
#   v1 (2026-07-19): initial lock, MC-lessons pass baseline.
#   v2 (2026-07-19): src/web.py — added _log_request_outcome middleware
#     (MC-lessons §5, request-outcome NDJSON log + zero-500 health check).
#   v3 (2026-07-19): static/index.html — added Ctrl/Cmd+K quick-capture
#     overlay, posting free text through /api/query (MC-lessons §7).
#   v4 (2026-07-19): src/web.py — added GET /api/profile/export; static/index.html
#     — added Export My Data button before Clear All Data (MC-lessons §8).
version: 4
files:
  - static/index.html
  - static/sw.js
  - src/web.py
