<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#13201d">
  <title>Mission Canvas Offline</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f5ef;
      color: #13201d;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(520px, calc(100vw - 32px));
      padding: 28px;
      border: 1px solid #d7d0c1;
      border-radius: 8px;
      background: #fffdf8;
      box-shadow: 0 20px 70px rgba(19, 32, 29, 0.12);
    }
    h1 { margin: 0 0 12px; font-size: 24px; letter-spacing: 0; }
    p { margin: 0 0 14px; line-height: 1.5; color: #46524f; }
    a { color: #8f3529; font-weight: 700; }
  </style>
</head>
<body>
  <main>
    <h1>Offline</h1>
    <p>Mission Canvas can queue work from the installed app, but the live pipeline needs a connection before it can answer.</p>
    <p>Reopen the app when you are connected and queued queries will replay through governance.</p>
    <a href="/">Return to Mission Canvas</a>
  </main>
</body>
</html>
