<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#17463b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Lingua Viva">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Lingua Viva</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      color-scheme: light;
      --ink: #17211f;
      --muted: #66736f;
      --line: #d8dfdc;
      --panel: #ffffff;
      --surface: #f5f7f4;
      --brand: #17463b;
      --brand-2: #2f6b5c;
      --accent: #b24b31;
      --warn: #8a5b00;
      --ok: #1f6f4a;
      --shadow: 0 8px 24px rgba(23, 33, 31, .08);
    }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--surface);
      color: var(--ink);
      min-height: 100vh;
    }
    button, input, select, textarea {
      font: inherit;
    }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 12px;
      cursor: pointer;
    }
    button.primary {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }
    button.icon {
      width: 38px;
      padding: 0;
      display: inline-grid;
      place-items: center;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
    }
    textarea {
      min-height: 112px;
      resize: vertical;
    }
    .app {
      display: grid;
      grid-template-columns: 200px minmax(0, 1fr);
      min-height: 100vh;
    }
    .sidebar {
      background: #fdfdfb;
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      gap: 14px;
    }
    .brand {
      display: flex;
      gap: 10px;
      align-items: center;
      min-height: 48px;
      padding: 4px 6px;
      border: 0;
      background: transparent;
      text-align: left;
      cursor: pointer;
    }
    .mark {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      background: var(--brand);
      color: #fff;
      font-weight: 750;
    }
    .brand strong {
      display: block;
      font-size: 15px;
      line-height: 1.15;
    }
    .brand span {
      display: block;
      font-size: 12px;
      color: var(--muted);
    }
    .nav {
      display: grid;
      gap: 4px;
    }
    .nav button {
      width: 100%;
      border-color: transparent;
      background: transparent;
      justify-content: flex-start;
      display: flex;
      gap: 9px;
      align-items: center;
      text-align: left;
      color: #283631;
    }
    .nav button.active {
      background: #e8f1ed;
      color: var(--brand);
      border-color: #cae0d8;
      font-weight: 700;
    }
    .utility {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: auto;
    }
    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 24px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .topbar h1 {
      font-size: 20px;
      margin: 0;
    }
    .role-pill, .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 26px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
      background: #fff;
    }
    .badge.ok {
      color: var(--ok);
      border-color: #b7ddca;
      background: #edf8f2;
    }
    .badge.warn {
      color: var(--warn);
      border-color: #e7d2a5;
      background: #fff7e8;
    }
    .content {
      padding: 22px 24px 32px;
      max-width: 1180px;
      width: 100%;
    }
    .view-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 18px;
    }
    .view-head p {
      margin: 5px 0 0;
      color: var(--muted);
      max-width: 740px;
    }
    .grid {
      display: grid;
      gap: 14px;
    }
    .grid.two {
      grid-template-columns: minmax(0, 320px) minmax(0, 1fr);
    }
    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .panel, .item {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .panel {
      padding: 16px;
    }
    .item {
      padding: 12px;
    }
    .item h3, .panel h2, .panel h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }
    .item p, .panel p {
      margin: 0 0 10px;
      color: var(--muted);
      line-height: 1.45;
    }
    .list {
      display: grid;
      gap: 8px;
    }
    .list button {
      text-align: left;
      min-height: 52px;
      display: block;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .full {
      grid-column: 1 / -1;
    }
    .output {
      white-space: pre-wrap;
      line-height: 1.45;
      background: #fbfcfb;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      min-height: 80px;
      overflow-wrap: anywhere;
    }
    .source-line {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0 12px;
    }
    .chat-log {
      display: grid;
      gap: 10px;
      max-height: 430px;
      overflow: auto;
      padding-right: 4px;
    }
    .message {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
    }
    .message.user {
      border-color: #bfd5cf;
      background: #f0f7f4;
    }
    .role-choice {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(23, 33, 31, .36);
      padding: 16px;
      z-index: 10;
    }
    .role-choice.visible {
      display: grid;
    }
    .role-dialog {
      width: min(520px, 100%);
      background: #fff;
      border-radius: 8px;
      border: 1px solid var(--line);
      box-shadow: 0 24px 70px rgba(23, 33, 31, .22);
      padding: 22px;
    }
    .role-dialog h2 {
      margin: 0 0 10px;
    }
    .role-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }
    .mic {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-size: 34px;
    }
    .hidden {
      display: none !important;
    }
    .qc-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: flex-start;
      justify-content: center;
      background: rgba(23, 33, 31, .36);
      padding: 16px;
      padding-top: 12vh;
      z-index: 20;
    }
    .qc-overlay.visible {
      display: flex;
    }
    .qc-dialog {
      width: min(560px, 100%);
      background: #fff;
      border-radius: 8px;
      border: 1px solid var(--line);
      box-shadow: 0 24px 70px rgba(23, 33, 31, .28);
      padding: 14px;
    }
    .qc-dialog input {
      width: 100%;
      font-size: 16px;
      padding: 12px 14px;
    }
    .qc-error {
      color: var(--accent);
      font-size: 13px;
      margin: 10px 2px 0;
    }
    .qc-hint {
      color: var(--muted);
      font-size: 12px;
      margin: 10px 2px 0;
    }
    .qc-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--brand);
      color: #fff;
      padding: 10px 18px;
      border-radius: 6px;
      box-shadow: var(--shadow);
      z-index: 30;
      display: none;
    }
    .qc-toast.visible {
      display: block;
    }
    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: sticky;
        top: 0;
        z-index: 5;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .nav {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .utility {
        margin-top: 0;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .grid.two, .grid.three, .form-grid {
        grid-template-columns: 1fr;
      }
      .content {
        padding: 18px 14px 28px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <button class="brand" id="brand-home" type="button">
        <div class="mark">LV</div>
        <div>
          <strong>Lingua Viva</strong>
          <span id="role-label">Teacher</span>
        </div>
      </button>
      <nav id="primary-nav" class="nav"></nav>
      <nav id="utility-nav" class="nav utility"></nav>
    </aside>
    <main class="main">
      <div class="topbar">
        <h1 id="view-title">Plan</h1>
        <div class="row">
          <span id="route-badge" class="role-pill">local route</span>
          <button id="change-role" type="button">Change role</button>
        </div>
      </div>
      <section id="content" class="content"></section>
      <div id="queue-actions" class="hidden" aria-live="polite"></div>
    </main>
  </div>

  <div id="role-choice" class="role-choice">
    <div class="role-dialog">
      <h2>🌱 Lingua Viva</h2>
      <p>A teacher workbench for Italian language instruction.</p>
      <p>Everything stays on your machine. No student data leaves. Ever.</p>
      <p>I am a:</p>
      <div class="role-actions">
        <button class="primary" data-role="teacher" type="button">I am a teacher</button>
        <button data-role="coordinator" type="button">I am a coordinator</button>
      </div>
    </div>
  </div>

  <div id="qc-overlay" class="qc-overlay">
    <div class="qc-dialog">
      <form id="qc-form">
        <input id="qc-input" type="text" autocomplete="off"
          placeholder="Quick capture — an observation, a note… (Enter to save, Esc to close)">
      </form>
      <div id="qc-error" class="qc-error hidden"></div>
      <div class="qc-hint">Ctrl/Cmd+K to open · Esc to close · goes through the same local privacy check as Ask</div>
    </div>
  </div>
  <div id="qc-toast" class="qc-toast"></div>

  <script>
    const state = {
      role: localStorage.getItem("lvRole") || "",
      view: "home",
      overview: null,
      grade: "G3",
      unitId: "",
      students: [],
      selectedStudent: "student-marco",
      chat: [],
      selectedTraceId: ""
    };

    const teacherNav = [
      ["home", "Home", "🏠"],
      ["plan", "Plan", "📋"],
      ["prepare", "Prepare", "✏️"],
      ["observe", "Observe", "👁️"],
      ["students", "Students", "👤"],
      ["assess", "Assess", "📊"],
      ["ask", "Ask", "💬"],
      ["parents", "Parents", "👨‍👩‍👧"]
    ];
    const adminNav = [
      ["programme", "Programme", "🗺️"],
      ["evidence", "Evidence", "📦"],
      ["capacity", "Capacity", "👥"],
      ["trends", "Trends", "📊"]
    ];
    const utilityNav = [
      ["why", "Why", "❓"],
      ["health", "Health", "❤️"],
      ["privacy", "Privacy", "🔒"],
      ["profile", "Profile", "👩‍🏫"],
      ["settings", "Settings", "⚙️"],
      ["reflect", "Reflect", "💭"]
    ];

    const $ = id => document.getElementById(id);
    const escapeHtml = value => String(value ?? "").replace(/[&<>"']/g, ch => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[ch]));

    async function api(path, options = {}) {
      const response = await fetch(path, {
        headers: {"Content-Type": "application/json", ...(options.headers || {})},
        ...options
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || `Request failed: ${response.status}`);
      return data;
    }

    function setRole(role) {
      state.role = role;
      localStorage.setItem("lvRole", role);
      state.view = role === "coordinator" ? "programme" : "home";
      $("role-choice").classList.remove("visible");
      renderShell();
      renderView();
    }

    function renderShell() {
      $("role-label").textContent = state.role === "coordinator" ? "Coordinator" : "Teacher";
      const primary = state.role === "coordinator" ? adminNav : teacherNav;
      $("primary-nav").innerHTML = primary.map(item => navButton(item)).join("");
      $("utility-nav").innerHTML = utilityNav.map(item => navButton(item)).join("");
      $("brand-home").onclick = () => {
        state.view = state.role === "coordinator" ? "programme" : "home";
        renderShell();
        renderView();
      };
      document.querySelectorAll("[data-view]").forEach(button => {
        button.addEventListener("click", () => {
          state.view = button.dataset.view;
          renderShell();
          renderView();
        });
      });
    }

    function navButton([id, label, icon]) {
      const active = id === state.view ? " active" : "";
      return `<button class="${active}" type="button" data-view="${id}"><span>${icon}</span><span>${label}</span></button>`;
    }

    function setTitle(title, badge = "local route") {
      $("view-title").textContent = title;
      $("route-badge").textContent = badge;
    }

    function sourceLine(text, extra = "") {
      return `<div class="source-line"><span class="badge ok">authoritative</span><span class="badge">${escapeHtml(text)}</span>${extra}</div>`;
    }

    async function ensureOverview() {
      if (!state.overview) state.overview = await api("/api/curriculum/overview");
      if (!state.unitId) {
        const grade = await api(`/api/curriculum/grade/${state.grade}`);
        state.unitId = grade.units[0]?.unit_id || "";
      }
      return state.overview;
    }

    async function ensureStudents() {
      const data = await api("/api/students");
      state.students = data.students || [];
      if (!state.selectedStudent && state.students[0]) state.selectedStudent = state.students[0].student_id;
      return state.students;
    }

    async function renderView() {
      const views = {
        home: renderHome,
        plan: renderPlan,
        prepare: renderPrepare,
        observe: renderObserve,
        students: renderStudents,
        assess: renderAssess,
        ask: renderAsk,
        parents: renderParents,
        why: renderWhy,
        health: renderHealth,
        privacy: renderPrivacy,
        profile: renderProfile,
        settings: renderSettings,
        reflect: renderReflect,
        programme: renderAdmin,
        evidence: renderAdmin,
        capacity: renderAdmin,
        trends: renderAdmin
      };
      try {
        await (views[state.view] || renderHome)();
      } catch (error) {
        $("content").innerHTML = `<div class="panel"><h2>Could not load this view</h2><p>${escapeHtml(error.message)}</p></div>`;
      }
    }

    async function renderHome() {
      setTitle("Home", "teacher brief");
      const schedule = localStorage.getItem("lvSchedule") || "{}";
      const data = await api(`/api/brief?schedule=${encodeURIComponent(schedule)}`);
      const today = data.today || {configured: false};
      const planHtml = today.configured
        ? `<h2>Good morning.</h2><p>Today: <strong>${escapeHtml(today.grade)} — ${escapeHtml(today.unit)}</strong></p><p>CEFR targets: ${escapeHtml((today.cefr_targets || []).join(", "))}</p><p>Source: ${escapeHtml(today.source || "")}</p>`
        : `<h2>Good morning.</h2><p>Set up your schedule in Settings → My Schedule to see today's plan.</p>`;
      $("content").innerHTML = `
        <div class="view-head"><div>${planHtml}</div><span class="badge ${data.health?.status === "OK" ? "ok" : "warn"}">System: ${escapeHtml(data.health?.status || "WARN")}</span></div>
        <div class="grid two">
          <div class="panel">
            <h3>⚠️ ${data.attention.unobserved_count} students unobserved for 14+ days</h3>
            <p>${escapeHtml((data.attention.unobserved_students || []).join(", ") || "No observation reminders right now.")}</p>
            <button id="home-observe" class="primary" type="button">Go to Observe</button>
          </div>
          <div class="panel">
            <h3>👤 ${data.attention.rti_pending} RTI decision pending</h3>
            <p>${escapeHtml((data.attention.rti_pending_names || []).join(", ") || "No pending RTI decisions.")}</p>
            <button id="home-students" type="button">Go to Students</button>
          </div>
          <div class="panel"><h3>This week</h3><p>${data.recent.observations_this_week} observations captured</p><p>Last reflection: ${escapeHtml(data.recent.last_reflection || "not recorded")}</p></div>
          <div class="panel"><h3>Health</h3><p>${escapeHtml(data.health?.summary || "")}</p></div>
        </div>`;
      $("home-observe").addEventListener("click", () => { state.view = "observe"; renderShell(); renderView(); });
      $("home-students").addEventListener("click", () => { state.view = "students"; renderShell(); renderView(); });
    }

    async function renderPlan() {
      setTitle("Plan", "curriculum");
      const overview = await ensureOverview();
      $("content").innerHTML = `
        <div class="view-head">
          <div><h2>Curriculum Navigator</h2><p>Browse grade bands, unit starters, and designed-to CEFR language without editing the source document.</p></div>
          <span class="badge ok">${escapeHtml(overview.source_status.badge)}</span>
        </div>
        <div class="grid two">
          <div class="panel"><h3>Grade Bands</h3><div class="list">
            ${overview.grade_bands.map(g => `<button type="button" data-grade="${g.grade}"><strong>${g.grade}</strong><br>${escapeHtml(g.cefr_target_wording)}<br><small>${g.unit_count} units</small></button>`).join("")}
          </div></div>
          <div id="grade-units" class="panel"></div>
        </div>`;
      document.querySelectorAll("[data-grade]").forEach(button => button.addEventListener("click", () => {
        state.grade = button.dataset.grade;
        loadGradeUnits();
      }));
      await loadGradeUnits();
    }

    async function loadGradeUnits() {
      const grade = await api(`/api/curriculum/grade/${state.grade}`);
      $("grade-units").innerHTML = `
        <h3>${escapeHtml(grade.grade)} Units</h3>
        ${sourceLine("Authoritative source: Manuale v1", `<span class="badge warn">${escapeHtml(grade.source_status.matrix_authority)}</span>`)}
        <div class="grid">
          ${grade.units.map(unit => `<div class="item">
            <h3>${escapeHtml(unit.title)}</h3>
            <p>${escapeHtml(unit.focus)}</p>
            <p><strong>${escapeHtml(unit.cefr_language)}</strong></p>
            <div class="source-line"><span class="badge">${escapeHtml(unit.source_citation)}</span></div>
            <button type="button" data-unit="${unit.unit_id}">Use this unit</button>
          </div>`).join("")}
        </div>`;
      document.querySelectorAll("[data-unit]").forEach(button => button.addEventListener("click", () => {
        state.unitId = button.dataset.unit;
        state.view = "prepare";
        renderShell();
        renderView();
      }));
    }

    async function renderPrepare() {
      setTitle("Prepare", "content differentiation");
      const overview = await ensureOverview();
      $("content").innerHTML = `
        <div class="view-head"><div><h2>Activity Generator</h2><p>Create a three-level activity pack for the selected grade and unit.</p></div></div>
        <div class="panel">
          <div class="form-grid">
            <label>Grade<select id="prep-grade">${overview.grade_bands.map(g => `<option ${g.grade === state.grade ? "selected" : ""}>${g.grade}</option>`).join("")}</select></label>
            <label>Unit<select id="prep-unit"></select></label>
            <label class="full">Topic<input id="prep-topic" value="" placeholder="Optional focus for today's lesson"></label>
          </div>
          <button id="generate-activity" class="primary" type="button">Generate Activity</button>
        </div>
        <div id="activity-output" class="grid three" style="margin-top:14px;"></div>`;
      $("prep-grade").addEventListener("change", async event => {
        state.grade = event.target.value;
        await populateUnitSelect("prep-unit");
      });
      await populateUnitSelect("prep-unit");
      $("generate-activity").addEventListener("click", generateActivity);
    }

    async function populateUnitSelect(id) {
      const grade = await api(`/api/curriculum/grade/${state.grade}`);
      const select = $(id);
      select.innerHTML = grade.units.map(unit => `<option value="${unit.unit_id}" ${unit.unit_id === state.unitId ? "selected" : ""}>${escapeHtml(unit.title)}</option>`).join("");
      state.unitId = select.value || state.unitId;
      select.addEventListener("change", event => { state.unitId = event.target.value; });
    }

    async function generateActivity() {
      const output = $("activity-output");
      output.innerHTML = `<div class="panel">Generating...</div>`;
      const data = await api("/api/prepare/activity", {
        method: "POST",
        body: JSON.stringify({grade: $("prep-grade").value, unit_id: $("prep-unit").value, topic: $("prep-topic").value})
      });
      const tiers = ["foundational", "on_track", "extended"];
      output.innerHTML = tiers.map(tier => {
        const item = data.tiers[tier];
        return `<div class="panel">
          <h3>${tier.replace("_", " ")}</h3>
          ${sourceLine(data.source_citation)}
          <p><strong>${escapeHtml(data.cefr_rule)}</strong></p>
          <p>${escapeHtml(item.learning_objective)}</p>
          <div class="output">${item.tasks.map(task => `• ${task.type}: ${task.prompt}`).join("\n")}</div>
        </div>`;
      }).join("");
    }

    async function renderObserve() {
      setTitle("Observe", "local observation");
      await ensureStudents();
      $("content").innerHTML = `

    function startSpeech() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        $("mic-status").textContent = "speech unavailable";
        return;
      }
      const recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.onstart = () => $("mic-status").textContent = "listening";
      recognition.onerror = () => $("mic-status").textContent = "try again";
      recognition.onresult = event => {
        $("obs-text").value = event.results[0][0].transcript;
        $("mic-status").textContent = "captured";
      };
      recognition.start();
    }

      for (const day of days) {
        const gradeSelect = document.querySelector(`[data-schedule-grade="${day}"]`);
        const unitSelect = document.querySelector(`[data-schedule-unit="${day}"]`);

        body: JSON.stringify({root_path: path, max_depth: Number($("filemap-depth").value || 3)})
      });
      $("filemap-status").innerHTML = `<span class="badge ok">scanned ${data.total_entries} folders</span><span class="badge warn">${data.student_zones_detected} student data zones excluded</span>`;
      await loadFileMap();
    }

    async function clearFileMap() {
      await api("/api/filemap/clear", {method: "POST", body: JSON.stringify({})});
      await loadFileMap();
    }

    function renderReflect() {
      setTitle("Reflect", "private note");
      $("content").innerHTML = `
        <div class="view-head"><div><h2>Private Reflection</h2><p>Save a private implementation note to the revision log.</p></div><span class="badge ok">private</span></div>
        <div class="panel"><textarea id="reflect-note" placeholder="The checklist artifact worked today..."></textarea><button id="save-reflect" class="primary" type="button" style="margin-top:12px;">Save Note</button><div id="reflect-result" style="margin-top:12px;"></div></div>`;
      $("save-reflect").addEventListener("click", async () => {
        const data = await api("/api/reflect/note", {method: "POST", body: JSON.stringify({note: $("reflect-note").value})});
        $("reflect-result").innerHTML = `<span class="badge ok">saved ${escapeHtml(data.timestamp)}</span>`;
      });
    }

    async function renderAdmin() {
      const title = state.view[0].toUpperCase() + state.view.slice(1);
      setTitle(title, state.view === "programme" ? "curriculum overview" : "planned after pilot evidence");
      if (state.view === "programme") {
        const data = await api("/api/admin/programme");
        $("content").innerHTML = `<div class="panel"><h2>Programme of Inquiry overview coming soon</h2><p>Current curriculum matrix structure is available from the local curriculum service.</p><div class="list">${data.grade_bands.map(g => `<div class="item"><h3>${escapeHtml(g.grade)}</h3><p>${escapeHtml(g.curriculum_focus)}</p></div>`).join("")}</div></div>`;
        return;
      }
      const data = await api(`/api/admin/${state.view}`);
      const requirements = (data.requires || []).map(item => `<li>${escapeHtml(item)}</li>`).join("");
      $("content").innerHTML = `
        <div class="view-head"><div><h2>${escapeHtml(data.title || title)}</h2><p>${escapeHtml(data.reason || "This coordinator view depends on pilot data.")}</p></div><span class="badge warn">${escapeHtml(data.status || "deferred")}</span></div>
        <div class="panel"><h3>Required Before Activation</h3><ul>${requirements}</ul><p class="muted">${escapeHtml(data.phase || "LV Phase 7 admin dashboard")}</p></div>`;
    }

    function studentOptions() {
      return state.students.map(student => `<option value="${student.student_id}" ${student.student_id === state.selectedStudent ? "selected" : ""}>${escapeHtml(student.display_name)}</option>`).join("");
    }

    // Quick capture (Ctrl/Cmd+K) — MC-lessons §7. Claudia's core loop is
    // capturing student observations mid-class; this makes it two
    // keystrokes instead of navigate-to-view + form. Always posts to
    // /api/query with no intent override — the classifier routes it,
    // same governed path (privacy check, trace, local-only) as Ask.
    let qcToastTimer = null;

    function openQuickCapture() {
      $("qc-input").value = "";
      $("qc-error").classList.add("hidden");
      $("qc-error").textContent = "";
      $("qc-overlay").classList.add("visible");
      $("qc-input").focus();
    }

    function closeQuickCapture() {
      $("qc-overlay").classList.remove("visible");
    }

    function showQcToast(message) {
      const toast = $("qc-toast");
      toast.textContent = message;
      toast.classList.add("visible");
      if (qcToastTimer) clearTimeout(qcToastTimer);
      qcToastTimer = setTimeout(() => toast.classList.remove("visible"), 3500);
    }

    async function submitQuickCapture(event) {
      event.preventDefault();
      const text = $("qc-input").value.trim();
      if (!text) return;
      try {
        const data = await api("/api/query", {
          method: "POST",
          body: JSON.stringify({query: text})
        });
        if (data.type === "error" || data.error) {
          $("qc-error").textContent = data.error || "Capture failed. Try again.";
          $("qc-error").classList.remove("hidden");
          return;
        }
        closeQuickCapture();
        showQcToast(`Captured → ${data.classification?.name || data.classification?.node || "local trace"}`);
      } catch (err) {
        $("qc-error").textContent = err.message || "Capture failed. Try again.";
        $("qc-error").classList.remove("hidden");
      }
    }

    document.addEventListener("keydown", event => {
      const key = event.key.toLowerCase();
      if ((event.metaKey || event.ctrlKey) && key === "k") {
        event.preventDefault();
        openQuickCapture();
        return;
      }
      if (key === "escape" && $("qc-overlay").classList.contains("visible")) {
        closeQuickCapture();
      }
    });
    $("qc-overlay").addEventListener("click", event => {
      if (event.target.id === "qc-overlay") closeQuickCapture();
    });
    $("qc-form").addEventListener("submit", submitQuickCapture);

    $("change-role").addEventListener("click", () => $("role-choice").classList.add("visible"));
    document.querySelectorAll("[data-role]").forEach(button => button.addEventListener("click", () => setRole(button.dataset.role)));

    if (!state.role) {
      $("role-choice").classList.add("visible");
      state.role = "teacher";
    }
    renderShell();
    renderView();
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(() => {});
  </script>
</body>
</html>
