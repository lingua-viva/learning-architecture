<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#17463b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Lingua Viva">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Lingua Viva</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      color-scheme: light;
      --ink: #17211f;
      --muted: #66736f;
      --line: #d8dfdc;
      --panel: #ffffff;
      --surface: #f5f7f4;
      --brand: #17463b;
      --brand-2: #2f6b5c;
      --accent: #b24b31;
      --warn: #8a5b00;
      --ok: #1f6f4a;
      --shadow: 0 8px 24px rgba(23, 33, 31, .08);
    }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--surface);
      color: var(--ink);
      min-height: 100vh;
    }
    button, input, select, textarea {
      font: inherit;
    }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      min-height: 38px;
      padding: 8px 12px;
      cursor: pointer;
    }
    button.primary {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }
    button.icon {
      width: 38px;
      padding: 0;
      display: inline-grid;
      place-items: center;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
    }
    textarea {
      min-height: 112px;
      resize: vertical;
    }
    .app {
      display: grid;
      grid-template-columns: 200px minmax(0, 1fr);
      min-height: 100vh;
    }
    .sidebar {
      background: #fdfdfb;
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      gap: 14px;
    }
    .brand {
      display: flex;
      gap: 10px;
      align-items: center;
      min-height: 48px;
      padding: 4px 6px;
    }
    .mark {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      background: var(--brand);
      color: #fff;
      font-weight: 750;
    }
    .brand strong {
      display: block;
      font-size: 15px;
      line-height: 1.15;
    }
    .brand span {
      display: block;
      font-size: 12px;
      color: var(--muted);
    }
    .nav {
      display: grid;
      gap: 4px;
    }
    .nav button {
      width: 100%;
      border-color: transparent;
      background: transparent;
      justify-content: flex-start;
      display: flex;
      gap: 9px;
      align-items: center;
      text-align: left;
      color: #283631;
    }
    .nav button.active {
      background: #e8f1ed;
      color: var(--brand);
      border-color: #cae0d8;
      font-weight: 700;
    }
    .utility {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: auto;
    }
    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 24px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .topbar h1 {
      font-size: 20px;
      margin: 0;
    }
    .role-pill, .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 26px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
      background: #fff;
    }
    .badge.ok {
      color: var(--ok);
      border-color: #b7ddca;
      background: #edf8f2;
    }
    .badge.warn {
      color: var(--warn);
      border-color: #e7d2a5;
      background: #fff7e8;
    }
    .content {
      padding: 22px 24px 32px;
      max-width: 1180px;
      width: 100%;
    }
    .view-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 18px;
    }
    .view-head p {
      margin: 5px 0 0;
      color: var(--muted);
      max-width: 740px;
    }
    .grid {
      display: grid;
      gap: 14px;
    }
    .grid.two {
      grid-template-columns: minmax(0, 320px) minmax(0, 1fr);
    }
    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .panel, .item {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .panel {
      padding: 16px;
    }
    .item {
      padding: 12px;
    }
    .item h3, .panel h2, .panel h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }
    .item p, .panel p {
      margin: 0 0 10px;
      color: var(--muted);
      line-height: 1.45;
    }
    .list {
      display: grid;
      gap: 8px;
    }
    .list button {
      text-align: left;
      min-height: 52px;
      display: block;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .full {
      grid-column: 1 / -1;
    }
    .output {
      white-space: pre-wrap;
      line-height: 1.45;
      background: #fbfcfb;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      min-height: 80px;
      overflow-wrap: anywhere;
    }
    .source-line {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0 12px;
    }
    .chat-log {
      display: grid;
      gap: 10px;
      max-height: 430px;
      overflow: auto;
      padding-right: 4px;
    }
    .message {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
    }
    .message.user {
      border-color: #bfd5cf;
      background: #f0f7f4;
    }
    .role-choice {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(23, 33, 31, .36);
      padding: 16px;
      z-index: 10;
    }
    .role-choice.visible {
      display: grid;
    }
    .role-dialog {
      width: min(520px, 100%);
      background: #fff;
      border-radius: 8px;
      border: 1px solid var(--line);
      box-shadow: 0 24px 70px rgba(23, 33, 31, .22);
      padding: 22px;
    }
    .role-dialog h2 {
      margin: 0 0 10px;
    }
    .role-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }
    .mic {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-size: 34px;
    }
    .hidden {
      display: none !important;
    }
    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: sticky;
        top: 0;
        z-index: 5;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .nav {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .utility {
        margin-top: 0;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .grid.two, .grid.three, .form-grid {
        grid-template-columns: 1fr;
      }
      .content {
        padding: 18px 14px 28px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">LV</div>
        <div>
          <strong>Lingua Viva</strong>
          <span id="role-label">Teacher</span>
        </div>
      </div>
      <nav id="primary-nav" class="nav"></nav>
      <nav id="utility-nav" class="nav utility"></nav>
    </aside>
    <main class="main">
      <div class="topbar">
        <h1 id="view-title">Plan</h1>
        <div class="row">
          <span id="route-badge" class="role-pill">local route</span>
          <button id="change-role" type="button">Change role</button>
        </div>
      </div>
      <section id="content" class="content"></section>
      <div id="queue-actions" class="hidden" aria-live="polite"></div>
    </main>
  </div>

  <div id="role-choice" class="role-choice">
    <div class="role-dialog">
      <h2>Choose your Lingua Viva workspace</h2>
      <p>Coordinator views are placeholders in this phase. The teacher workspace is active.</p>
      <div class="role-actions">
        <button class="primary" data-role="teacher" type="button">I am a teacher</button>
        <button data-role="coordinator" type="button">I am a coordinator</button>
      </div>
    </div>
  </div>

  <script>
    const state = {
      role: localStorage.getItem("lvRole") || "",
      view: "plan",
      overview: null,
      grade: "G3",
      unitId: "",
      students: [],
      selectedStudent: "student-marco",
      chat: []
    };

    const teacherNav = [
      ["plan", "Plan", "📋"],
      ["prepare", "Prepare", "✏️"],
      ["observe", "Observe", "👁️"],
      ["students", "Students", "👤"],
      ["assess", "Assess", "📊"],
      ["ask", "Ask", "💬"],
      ["parents", "Parents", "👨‍👩‍👧"]
    ];
    const adminNav = [
      ["programme", "Programme", "🗺️"],
      ["evidence", "Evidence", "📦"],
      ["capacity", "Capacity", "👥"],
      ["trends", "Trends", "📊"]
    ];
    const utilityNav = [
      ["health", "Health", "❤️"],
      ["privacy", "Privacy", "🔒"],
      ["settings", "Settings", "⚙️"],
      ["reflect", "Reflect", "💭"]
    ];

    const $ = id => document.getElementById(id);
    const escapeHtml = value => String(value ?? "").replace(/[&<>"']/g, ch => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[ch]));

    async function api(path, options = {}) {
      const response = await fetch(path, {
        headers: {"Content-Type": "application/json", ...(options.headers || {})},
        ...options
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || `Request failed: ${response.status}`);
      return data;
    }

    function setRole(role) {
      state.role = role;
      localStorage.setItem("lvRole", role);
      state.view = role === "coordinator" ? "programme" : "plan";
      $("role-choice").classList.remove("visible");
      renderShell();
      renderView();
    }

    function renderShell() {
      $("role-label").textContent = state.role === "coordinator" ? "Coordinator" : "Teacher";
      const primary = state.role === "coordinator" ? adminNav : teacherNav;
      $("primary-nav").innerHTML = primary.map(item => navButton(item)).join("");
      $("utility-nav").innerHTML = utilityNav.map(item => navButton(item)).join("");
      document.querySelectorAll("[data-view]").forEach(button => {
        button.addEventListener("click", () => {
          state.view = button.dataset.view;
          renderShell();
          renderView();
        });
      });
    }

    function navButton([id, label, icon]) {
      const active = id === state.view ? " active" : "";
      return `<button class="${active}" type="button" data-view="${id}"><span>${icon}</span><span>${label}</span></button>`;
    }

    function setTitle(title, badge = "local route") {
      $("view-title").textContent = title;
      $("route-badge").textContent = badge;
    }

    function sourceLine(text, extra = "") {
      return `<div class="source-line"><span class="badge ok">authoritative</span><span class="badge">${escapeHtml(text)}</span>${extra}</div>`;
    }

    async function ensureOverview() {
      if (!state.overview) state.overview = await api("/api/curriculum/overview");
      if (!state.unitId) {
        const grade = await api(`/api/curriculum/grade/${state.grade}`);
        state.unitId = grade.units[0]?.unit_id || "";
      }
      return state.overview;
    }

    async function ensureStudents() {
      const data = await api("/api/students");
      state.students = data.students || [];
      if (!state.selectedStudent && state.students[0]) state.selectedStudent = state.students[0].student_id;
      return state.students;
    }

    async function renderView() {
      const views = {
        plan: renderPlan,
        prepare: renderPrepare,
        observe: renderObserve,
        students: renderStudents,
        assess: renderAssess,
        ask: renderAsk,
        parents: renderParents,
        health: renderHealth,
        privacy: renderPrivacy,
        settings: renderSettings,
        reflect: renderReflect,
        programme: renderAdmin,
        evidence: renderAdmin,
        capacity: renderAdmin,
        trends: renderAdmin
      };
      try {
        await (views[state.view] || renderPlan)();
      } catch (error) {
        $("content").innerHTML = `<div class="panel"><h2>Could not load this view</h2><p>${escapeHtml(error.message)}</p></div>`;
      }
    }

    async function renderPlan() {
      setTitle("Plan", "curriculum");
      const overview = await ensureOverview();
      $("content").innerHTML = `
        <div class="view-head">
          <div><h2>Curriculum Navigator</h2><p>Browse grade bands, unit starters, and designed-to CEFR language without editing the source document.</p></div>
          <span class="badge ok">${escapeHtml(overview.source_status.badge)}</span>
        </div>
        <div class="grid two">
          <div class="panel"><h3>Grade Bands</h3><div class="list">
            ${overview.grade_bands.map(g => `<button type="button" data-grade="${g.grade}"><strong>${g.grade}</strong><br>${escapeHtml(g.cefr_target_wording)}<br><small>${g.unit_count} units</small></button>`).join("")}
          </div></div>
          <div id="grade-units" class="panel"></div>
        </div>`;
      document.querySelectorAll("[data-grade]").forEach(button => button.addEventListener("click", () => {
        state.grade = button.dataset.grade;
        loadGradeUnits();
      }));
      await loadGradeUnits();
    }

    async function loadGradeUnits() {
      const grade = await api(`/api/curriculum/grade/${state.grade}`);
      $("grade-units").innerHTML = `
        <h3>${escapeHtml(grade.grade)} Units</h3>
        ${sourceLine("Authoritative source: Manuale v1", `<span class="badge warn">${escapeHtml(grade.source_status.matrix_authority)}</span>`)}
        <div class="grid">
          ${grade.units.map(unit => `<div class="item">
            <h3>${escapeHtml(unit.title)}</h3>
            <p>${escapeHtml(unit.focus)}</p>
            <p><strong>${escapeHtml(unit.cefr_language)}</strong></p>
            <div class="source-line"><span class="badge">${escapeHtml(unit.source_citation)}</span></div>
            <button type="button" data-unit="${unit.unit_id}">Use this unit</button>
          </div>`).join("")}
        </div>`;
      document.querySelectorAll("[data-unit]").forEach(button => button.addEventListener("click", () => {
        state.unitId = button.dataset.unit;
        state.view = "prepare";
        renderShell();
        renderView();
      }));
    }

    async function renderPrepare() {
      setTitle("Prepare", "content differentiation");
      const overview = await ensureOverview();
      $("content").innerHTML = `
        <div class="view-head"><div><h2>Activity Generator</h2><p>Create a three-level activity pack for the selected grade and unit.</p></div></div>
        <div class="panel">
          <div class="form-grid">
            <label>Grade<select id="prep-grade">${overview.grade_bands.map(g => `<option ${g.grade === state.grade ? "selected" : ""}>${g.grade}</option>`).join("")}</select></label>
            <label>Unit<select id="prep-unit"></select></label>
            <label class="full">Topic<input id="prep-topic" value="" placeholder="Optional focus for today's lesson"></label>
          </div>
          <button id="generate-activity" class="primary" type="button">Generate Activity</button>
        </div>
        <div id="activity-output" class="grid three" style="margin-top:14px;"></div>`;
      $("prep-grade").addEventListener("change", async event => {
        state.grade = event.target.value;
        await populateUnitSelect("prep-unit");
      });
      await populateUnitSelect("prep-unit");
      $("generate-activity").addEventListener("click", generateActivity);
    }

    async function populateUnitSelect(id) {
      const grade = await api(`/api/curriculum/grade/${state.grade}`);
      const select = $(id);
      select.innerHTML = grade.units.map(unit => `<option value="${unit.unit_id}" ${unit.unit_id === state.unitId ? "selected" : ""}>${escapeHtml(unit.title)}</option>`).join("");
      state.unitId = select.value || state.unitId;
      select.addEventListener("change", event => { state.unitId = event.target.value; });
    }

    async function generateActivity() {
      const output = $("activity-output");
      output.innerHTML = `<div class="panel">Generating...</div>`;
      const data = await api("/api/prepare/activity", {
        method: "POST",
        body: JSON.stringify({grade: $("prep-grade").value, unit_id: $("prep-unit").value, topic: $("prep-topic").value})
      });
      const tiers = ["foundational", "on_track", "extended"];
      output.innerHTML = tiers.map(tier => {
        const item = data.tiers[tier];
        return `<div class="panel">
          <h3>${tier.replace("_", " ")}</h3>
          ${sourceLine(data.source_citation)}
          <p><strong>${escapeHtml(data.cefr_rule)}</strong></p>
          <p>${escapeHtml(item.learning_objective)}</p>
          <div class="output">${item.tasks.map(task => `• ${task.type}: ${task.prompt}`).join("\n")}</div>
        </div>`;
      }).join("");
    }

    async function renderObserve() {
      setTitle("Observe", "local observation");
      await ensureStudents();
      $("content").innerHTML = `
        <div class="view-head"><div><h2>Capture Observation</h2><p>Record or type a short teacher note and attach it to a local student lens.</p></div><span class="badge ok">local only</span></div>
        <div class="grid two">
          <div class="panel">
            <label>Student<select id="obs-student">${studentOptions()}</select></label>
            <div class="row" style="margin:14px 0;"><button id="mic" class="mic" type="button" title="Start speech capture">🎙</button><span id="mic-status" class="badge">ready</span></div>
            <textarea id="obs-text" placeholder="Marco self-corrected passato prossimo, used essere correctly in context"></textarea>
            <div class="form-grid" style="margin-top:12px;">
              <label>CEFR skill<select id="obs-dim"><option>speaking</option><option>listening</option><option>reading</option><option>writing</option></select></label>
              <label>Observed level<select id="obs-level"><option>A1</option><option>A1+</option><option>A2</option><option>A2+</option><option>B1</option></select></label>
            </div>
            <button id="save-observation" class="primary" type="button">Save Observation</button>
          </div>
          <div id="obs-result" class="panel"><h3>Saved notes appear here</h3><p>Student data stays on this machine.</p></div>
        </div>`;
      $("mic").addEventListener("click", startSpeech);
      $("save-observation").addEventListener("click", saveObservation);
    }

    function startSpeech() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        $("mic-status").textContent = "speech unavailable";
        return;
      }
      const recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.onstart = () => $("mic-status").textContent = "listening";
      recognition.onerror = () => $("mic-status").textContent = "try again";
      recognition.onresult = event => {
        $("obs-text").value = event.results[0][0].transcript;
        $("mic-status").textContent = "captured";
      };
      recognition.start();
    }

    async function saveObservation() {
      const result = await api("/api/observe/capture", {
        method: "POST",
        body: JSON.stringify({
          student_id: $("obs-student").value,
          transcript: $("obs-text").value,
          cefr_dimension: $("obs-dim").value,
          cefr_level_observed: $("obs-level").value
        })
      });
      $("obs-result").innerHTML = `<h3>Saved</h3><p>Observation ${escapeHtml(result.observation.observation_id)} is attached to the local lens.</p><div class="output">${escapeHtml(result.observation.raw_transcript)}</div>`;
    }

    async function renderStudents() {
      setTitle("Students", "teacher decision gate");
      await ensureStudents();
      $("content").innerHTML = `
        <div class="view-head"><div><h2>Student Lenses</h2><p>View profiles, observations, CEFR trajectory, grouping notes, and RTI proposals. The system suggests; the teacher decides.</p></div></div>
        <div class="grid two">
          <div class="panel"><h3>Roster</h3><div class="list">${state.students.map(s => `<button type="button" data-student="${s.student_id}"><strong>${escapeHtml(s.display_name)}</strong><br>RTI Tier ${s.rti_current_tier} · ${escapeHtml(s.grade_level)}</button>`).join("")}</div></div>
          <div id="lens" class="panel"></div>
        </div>`;
      document.querySelectorAll("[data-student]").forEach(button => button.addEventListener("click", () => {
        state.selectedStudent = button.dataset.student;
        loadLens();
      }));
      await loadLens();
    }

    async function loadLens() {
      const lens = await api(`/api/students/${state.selectedStudent}/lens`);
      const observations = (lens.observations || []).slice(-3).reverse();
      $("lens").innerHTML = `
        <h3>${escapeHtml(lens.display_name)}</h3>
        <p>CEFR trajectory: <strong>${escapeHtml(lens.cefr_trajectory_30d)}</strong> · RTI Tier <strong>${lens.rti_current_tier}</strong></p>
        <div class="source-line"><span class="badge warn">System suggests: review before any tier decision</span></div>
        <div class="row"><button type="button">Confirm</button><button type="button">Defer</button></div>
        <h3 style="margin-top:16px;">Recent observations</h3>
        <div class="list">${observations.length ? observations.map(o => `<div class="item"><p>${escapeHtml(o.raw_transcript)}</p><span class="badge">${escapeHtml(o.cefr_level_observed || "not tagged")}</span></div>`).join("") : "<p>No observations yet.</p>"}</div>
        <h3 style="margin-top:16px;">Grouping</h3>
        <p>Avoid-pairing notes: ${escapeHtml((lens.avoid_pairing_with || []).join(", ") || "none")}</p>`;
    }

    async function renderAssess() {
      setTitle("Assess", "rubric design");
      await ensureOverview();
      $("content").innerHTML = `
        <div class="view-head"><div><h2>Rubric Template</h2><p>Build CEFR-informed assessment structures with designed-to-target wording.</p></div></div>
        <div class="panel"><div class="form-grid"><label>Grade<select id="assess-grade"></select></label><label>Unit<select id="assess-unit"></select></label></div><button id="load-rubric" class="primary" type="button">Show Rubric</button></div>
        <div id="rubric-output" class="panel" style="margin-top:14px;"></div>`;
      $("assess-grade").innerHTML = state.overview.grade_bands.map(g => `<option ${g.grade === state.grade ? "selected" : ""}>${g.grade}</option>`).join("");
      $("assess-grade").addEventListener("change", async event => { state.grade = event.target.value; await populateUnitSelect("assess-unit"); });
      await populateUnitSelect("assess-unit");
      $("load-rubric").addEventListener("click", loadRubric);
    }

    async function loadRubric() {
      const data = await api(`/api/assess/rubric/${$("assess-unit").value}`);
      const assessment = data.assessment;
      $("rubric-output").innerHTML = `
        <h3>${escapeHtml(data.unit.title)}</h3>
        ${sourceLine(assessment.source_citation)}
        <p><strong>${escapeHtml(assessment.cefr_language)}</strong></p>
        <div class="grid three">${Object.entries(assessment.criteria).map(([code, label]) => `<div class="item"><h3>Criterion ${escapeHtml(code)}</h3><p>${escapeHtml(label)}</p></div>`).join("")}</div>
        <h3 style="margin-top:16px;">Tier Tasks</h3>
        <div class="output">${Object.values(assessment.tier_assessments).map(item => `${item.tier}: ${item.task_prompt}`).join("\n\n")}</div>`;
    }

    async function renderAsk() {
      setTitle("Ask", "governed local reasoning");
      $("content").innerHTML = `
        <div class="view-head"><div><h2>Ask Lingua Viva</h2><p>Free-form teacher questions route through the governed local app runtime.</p></div><span class="badge ok">governance route</span></div>
        <div class="panel">
          <div id="chat-log" class="chat-log">${state.chat.map(renderMessage).join("")}</div>
          <form id="ask-form" class="row" style="margin-top:12px;"><input id="ask-input" placeholder="How do I scaffold articles for mixed-level Grade 3?"><button class="primary" type="submit">Send</button></form>
        </div>`;
      $("ask-form").addEventListener("submit", askQuestion);
    }

    function renderMessage(message) {
      return `<div class="message ${message.role === "teacher" ? "user" : ""}"><strong>${message.role}</strong><p>${escapeHtml(message.text)}</p></div>`;
    }

    async function askQuestion(event) {
      event.preventDefault();
      const text = $("ask-input").value.trim();
      if (!text) return;
      state.chat.push({role: "teacher", text});
      $("ask-input").value = "";
      renderAsk();
      const response = await fetch("/api/query", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({query: text, intent: "TEACH"})
      });
      const data = await response.json();
      state.chat.push({role: "Lingua Viva", text: data.result?.content || data.error || "No response."});
      renderAsk();
    }

    async function renderParents() {
      setTitle("Parents", "parent-safe draft");
      await ensureStudents();
      $("content").innerHTML = `
        <div class="view-head"><div><h2>Parent Recommendation</h2><p>Draft a parent-safe message for teacher review.</p></div><span class="badge warn">Review before sending. No AI attribution in final message.</span></div>
        <div class="grid two">
          <div class="panel"><label>Student<select id="parent-student">${studentOptions()}</select></label><label style="display:block;margin-top:12px;">Home support focus<input id="parent-focus" value="creative quiet workspace"></label><button id="draft-parent" class="primary" type="button" style="margin-top:12px;">Draft Recommendation</button></div>
          <div id="parent-output" class="panel"><p>Drafts appear here for editing before sending.</p></div>
        </div>`;
      $("draft-parent").addEventListener("click", draftParent);
    }

    async function draftParent() {
      const data = await api("/api/parents/recommendation", {
        method: "POST",
        body: JSON.stringify({student_id: $("parent-student").value, focus: $("parent-focus").value})
      });
      $("parent-output").innerHTML = `<h3>${escapeHtml(data.subject_line)}</h3>${sourceLine(data.source_citation)}<textarea>${escapeHtml(data.body + "\n\n" + data.home_activities.join("\n"))}</textarea><p>${escapeHtml(data.review_label)}</p>`;
    }

    async function renderHealth() {
      setTitle("Health", "doctor");
      $("content").innerHTML = `<div class="panel"><h2>Running Doctor...</h2></div>`;
      const data = await api("/api/health");
      const bundleButton = data.status === "OK" ? "" : `<button id="create-bundle" class="primary" type="button">Create Support Bundle</button>`;
      $("content").innerHTML = `
        <div class="view-head"><div><h2>Doctor</h2><p>${escapeHtml(data.summary || "")}</p></div><span class="badge ${data.status === "OK" ? "ok" : "warn"}">${escapeHtml(data.status)}</span></div>
        <div class="panel">${bundleButton}<div id="bundle-result" style="margin-top:12px;"></div><div class="list" style="margin-top:14px;">${(data.checks || []).map(check => `<div class="item"><h3>${escapeHtml(check.status)} · ${escapeHtml(check.id)}</h3><p>${escapeHtml(check.message)}</p></div>`).join("")}</div></div>`;
      const button = $("create-bundle");
      if (button) button.addEventListener("click", createSupportBundle);
    }

    async function createSupportBundle() {
      const target = $("bundle-result");
      target.innerHTML = `<span class="badge">creating local bundle...</span>`;
      const data = await api("/api/support-bundle", {method: "POST", body: JSON.stringify({})});
      target.innerHTML = `<div class="item"><h3>Support bundle created</h3><p>${escapeHtml(data.bundle_path)}</p><p>No student data was included. No files were uploaded.</p></div>`;
    }

    async function renderPrivacy() {
      setTitle("Privacy", "local-first");
      let publication = {safe_to_claim: [], needs_evidence: [], blocked: [], not_publication_ready: true};
      try { publication = await api("/api/publication/status"); } catch {}
      $("content").innerHTML = `
        <div class="view-head"><div><h2>Privacy</h2><p>Lingua Viva is built for local teacher work.</p></div><span class="badge ok">all local</span></div>
        <div class="grid three">
          <div class="panel"><h3>No uploads</h3><p>Student observations, lenses, reflections, and parent drafts stay on this machine.</p></div>
          <div class="panel"><h3>No external calls</h3><p>Teacher workflows use local app endpoints and Ollama-only model settings.</p></div>
          <div class="panel"><h3>No student surface</h3><p>Students do not chat with this app. Teachers prepare and decide.</p></div>
        </div>
        <div class="panel" style="margin-top:14px;">
          <h3>Publication Readiness</h3>
          <div class="source-line"><span class="badge ${publication.not_publication_ready ? "warn" : "ok"}">${publication.not_publication_ready ? "not publication-ready" : "publication-ready"}</span><span class="badge">${publication.claim_count || 0} claims reviewed</span></div>
          <p>Safe to claim: ${publication.safe_to_claim.length}. Needs evidence: ${publication.needs_evidence.length}. Blocked: ${publication.blocked.length}.</p>
          <div class="output">${publication.blocked.map(claim => `${claim.id}: ${claim.required_action}`).join("\n") || "No blocked claims reported."}</div>
        </div>`;
    }

    async function renderSettings() {
      setTitle("Settings", "local configuration");
      let status = {ollama_reachable: false, model: null};
      try { status = await api("/api/provider"); } catch {}
      $("content").innerHTML = `
        <div class="view-head"><div><h2>Settings</h2><p>Local model and server configuration.</p></div></div>
        <div class="grid two">
          <div class="panel"><h3>Ollama Model</h3><select><option>${escapeHtml(status.model || "qwen2.5:3b")}</option><option>qwen3:8b</option><option>llama3.1:8b</option></select><p>Ollama reachable: ${status.ollama_reachable ? "yes" : "no"}</p></div>
          <div class="panel"><h3>Port</h3><input value="8787"><p>Desktop shell loads http://127.0.0.1:8787.</p></div>
        </div>`;
    }

    function renderReflect() {
      setTitle("Reflect", "private note");
      $("content").innerHTML = `
        <div class="view-head"><div><h2>Private Reflection</h2><p>Save a private implementation note to the revision log.</p></div><span class="badge ok">private</span></div>
        <div class="panel"><textarea id="reflect-note" placeholder="The checklist artifact worked today..."></textarea><button id="save-reflect" class="primary" type="button" style="margin-top:12px;">Save Note</button><div id="reflect-result" style="margin-top:12px;"></div></div>`;
      $("save-reflect").addEventListener("click", async () => {
        const data = await api("/api/reflect/note", {method: "POST", body: JSON.stringify({note: $("reflect-note").value})});
        $("reflect-result").innerHTML = `<span class="badge ok">saved ${escapeHtml(data.timestamp)}</span>`;
      });
    }

    async function renderAdmin() {
      const title = state.view[0].toUpperCase() + state.view.slice(1);
      setTitle(title, state.view === "programme" ? "curriculum overview" : "coordinator placeholder");
      if (state.view === "programme") {
        const data = await api("/api/admin/programme");
        $("content").innerHTML = `<div class="panel"><h2>Programme of Inquiry overview coming soon</h2><p>Current curriculum matrix structure is available from the local curriculum service.</p><div class="list">${data.grade_bands.map(g => `<div class="item"><h3>${escapeHtml(g.grade)}</h3><p>${escapeHtml(g.curriculum_focus)}</p></div>`).join("")}</div></div>`;
        return;
      }
      const copy = {
        evidence: "Accreditation evidence bundle — requires teacher observation data.",
        capacity: "Staffing & capacity assessment.",
        trends: "School-wide anonymized trends — requires accumulated data."
      }[state.view] || "Coordinator data view.";
      $("content").innerHTML = `<div class="panel"><h2>${escapeHtml(title)}</h2><p>${escapeHtml(copy)}</p></div>`;
    }

    function studentOptions() {
      return state.students.map(student => `<option value="${student.student_id}" ${student.student_id === state.selectedStudent ? "selected" : ""}>${escapeHtml(student.display_name)}</option>`).join("");
    }

    $("change-role").addEventListener("click", () => $("role-choice").classList.add("visible"));
    document.querySelectorAll("[data-role]").forEach(button => button.addEventListener("click", () => setRole(button.dataset.role)));

    if (!state.role) {
      $("role-choice").classList.add("visible");
      state.role = "teacher";
    }
    renderShell();
    renderView();
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(() => {});
  </script>
</body>
</html>
